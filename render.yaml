services:
  - type: web
    name: hashtag-smart-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn hashtag_smart.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "hashtag-smart-api.onrender.com"
      - key: CORS_ORIGINS
        value: "https://YOUR_USERNAME.github.io"

databases:
  - name: hashtag-smart-db
    plan: free